global:
  scrape_interval: 5s

scrape_configs:
- job_name: "prometheus"
  static_configs:
  - targets:
    - localhost:9090

- job_name: node exporter for monitoring.eniemela.fi
  static_configs:
    - targets: ['10.0.0.3:9100']
      labels:
        service: 'monitoring.eniemela.fi'

- job_name: node exporter for agent16.eniemela.fi
  static_configs:
    - targets: ['10.0.0.2:9100']
      labels:
        service: 'agent16.eniemela.fi'
